<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键种鸟</title>
    <link rel="stylesheet" href="../css/one-click.css">
    <link rel="stylesheet" href="../css/plant-bird.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌱 一键种鸟</h1>
            <button class="back-btn" onclick="window.location.href='../index.html'">返回首页</button>
        </div>

        <div class="content">
            <!-- 用户选择 -->
            <div class="user-selector" style="text-align: center;">
                <select id="userSelect" class="user-select" onchange="onUserChange()">
                    <option value="">请选择用户</option>
                </select>
            </div>

            <!-- 道具开关区域 -->
            <div class="prop-area" id="propArea">
                <div class="prop-row">
                    <label class="switch-label">
                        <span>使用加速道具</span>
                        <div class="toggle-wrap">
                            <input type="checkbox" id="usePropSwitch" onchange="onPropSwitchChange()">
                            <span class="toggle"></span>
                        </div>
                    </label>
                    <label class="switch-label" id="autoBuyWrap" style="display:none;">
                        <span>道具不足自动购买</span>
                        <div class="toggle-wrap">
                            <input type="checkbox" id="autoBuySwitch">
                            <span class="toggle"></span>
                        </div>
                    </label>
                </div>
                <div id="propSelectWrap" style="display:none;">
                    <select id="propSelect" class="bait-select">
                        <option value="">加载中...</option>
                    </select>
                    <button class="refresh-btn" onclick="loadProps()" title="刷新道具列表">🔄</button>
                    <label class="config-label" style="margin-left:8px;">购买数量：
                        <input type="number" id="propBuyNum" value="50" min="1" class="config-input">
                    </label>
                </div>
            </div>

            <!-- 配置区域 -->
            <div class="config-area">
                <div class="bait-select-wrap">
                    <label class="config-label">选择诱饵：</label>
                    <select id="baitSelect" class="bait-select" onchange="updateBaitDesc()"></select>
                    <div id="baitDesc" class="bait-desc"></div>
                </div>
                <label class="config-label">购买数量：
                    <input type="number" id="baitNum" value="100" min="1" class="config-input">
                </label>
                <label class="config-label">执行轮数：
                    <input type="number" id="maxRounds" value="100" min="1" class="config-input">
                </label>
                <label class="config-label">轮间隔（秒）：
                    <input type="number" id="roundInterval" value="5" min="0" class="config-input">
                </label>
            </div>

            <!-- 操作按钮 -->
            <div style="margin-bottom: 20px; text-align: center; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <button class="action-btn" id="startBtn" onclick="startPlantBird()" style="background: #28a745; font-size: 17px; padding: 14px 28px;">🌱 开始种鸟</button>
                <button class="action-btn" id="stopBtn" onclick="stopPlantBird()" style="background: #dc3545; font-size: 17px; padding: 14px 28px;" disabled>⏹ 停止</button>
                <button class="action-btn" onclick="clearOutput()" style="background: #6c757d; font-size: 17px; padding: 14px 28px;">🗑 清空日志</button>
            </div>

            <!-- 状态显示 -->
            <div id="statusBar" class="status-bar">
                <span id="statusText">等待操作...</span>
                <span id="countdownText" class="countdown"></span>
            </div>

            <!-- 输出区域 -->
            <div class="output-area">
                <h3>运行日志</h3>
                <div id="outputContent" class="output-content empty">等待操作...</div>
            </div>
        </div>
    </div>

    <script src="../js/plant-bird.js"></script>
</body>
</html>
