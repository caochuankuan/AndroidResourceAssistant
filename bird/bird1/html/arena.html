<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键竞技场</title>
    <link rel="stylesheet" href="../css/arena.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>一键竞技场</h1>
            <button class="back-btn" onclick="window.location.href='../../index.html'">返回首页</button>
        </div>

        <div class="content">
            <!-- 配置区域 -->
            <div class="config-area">
                <!-- 用户选择 -->
                <div class="config-item">
                    <label for="userSelect">选择用户</label>
                    <select id="userSelect" class="user-select">
                        <option value="">请选择用户</option>
                    </select>
                </div>

                <!-- 战斗目标排名 -->
                <div class="config-item">
                    <label for="targetRank">战斗第几个（从1开始，留空为最后一个）</label>
                    <input type="number" id="targetRank" min="1" placeholder="留空 = 最后一个">
                </div>

                <!-- 战斗间隔 -->
                <div class="config-item">
                    <label for="fightInterval">战斗间隔（秒）</label>
                    <input type="number" id="fightInterval" min="1" value="5" placeholder="默认5秒">
                </div>

                <!-- 操作按钮 -->
                <div class="config-actions">
                    <button class="btn-start" id="startBtn" onclick="startArena()">▶ 开始循环</button>
                    <button class="btn-stop" id="stopBtn" onclick="stopArena()" disabled>■ 停止</button>
                    <button class="btn-clear" onclick="clearOutput()">清空日志</button>
                </div>
            </div>

            <!-- 状态栏 -->
            <div class="status-bar" id="statusBar">
                <span id="statusText">等待开始...</span>
                <span id="fightCount" class="fight-count"></span>
            </div>

            <!-- 竞技场排行榜预览 -->
            <div class="rank-area" id="rankArea" style="display:none;">
                <h3>当前排行榜 <span id="rankUpdateTime" class="update-time"></span></h3>
                <div id="rankList" class="rank-list"></div>
            </div>

            <!-- 输出日志 -->
            <div class="output-area">
                <h3>战斗日志</h3>
                <div id="outputContent" class="output-content empty">等待开始...</div>
            </div>
        </div>
    </div>

    <script src="../js/arena.js"></script>
</body>
</html>
